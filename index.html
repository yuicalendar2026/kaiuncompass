<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開運コンパス - 自宅ピン留め版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --main-deep-blue: #101c31;
            --gold: #d4af37;
            --home-blue: #3498db;
        }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #f4f1ea; }
        header {
            background: linear-gradient(180deg, var(--main-deep-blue) 0%, #1a2a44 100%);
            color: #fcf4d9; padding: 15px; text-align: center; border-bottom: 2px solid var(--gold);
            position: relative; z-index: 1000;
        }
        #map { width: 100%; height: calc(100% - 180px); z-index: 1; }
        
        /* 自宅から伸びる方位線のオーバーレイ */
        .lucky-beam {
            position: absolute; width: 2000px; height: 2000px;
            background: conic-gradient(from 120deg, rgba(212, 175, 55, 0.25) 0deg 60deg, transparent 60deg 360deg);
            pointer-events: none; z-index: 400; transform-origin: center;
        }

        .info-panel {
            position: fixed; bottom: 0; width: 100%; background: white;
            border-radius: 20px 20px 0 0; padding: 20px; box-sizing: border-box;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.2); z-index: 1000;
        }
        .jinja-name { font-size: 1.1rem; font-weight: bold; color: var(--main-deep-blue); }
        .home-addr { font-size: 0.8rem; color: var(--home-blue); margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 1.2rem; color: var(--gold);">開運コンパス</div>
    <div style="font-size: 0.8rem;">自宅を基点に吉方位を測定中</div>
</header>

<div id="map"></div>

<div class="info-panel">
    <div class="jinja-name">⛩️ 甲山八幡宮 (自宅から南東)</div>
    <div class="home-addr">🏠 自宅：兵庫県西宮市名塩さくら台</div>
    <p style="font-size: 0.85rem; color: #666; margin: 10px 0;">
        自宅からの距離：約10.5km<br>
        本日は「天赦日」。自宅から東南へ向かうと良縁に恵まれます。
    </p>
</div>

<script>
    // 自宅の座標 (西宮市名塩さくら台)
    const homePos = [34.839, 135.278];
    const targetPos = [34.755, 135.350]; // 目的地（甲山付近）

    const map = L.map('map', { zoomControl: false }).setView(homePos, 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 1. 自宅ピン (青)
    const homeIcon = L.divIcon({
        html: '<div style="font-size: 30px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));">🏠</div>',
        className: 'custom-icon', iconSize: [40, 40], iconAnchor: [20, 20]
    });
    L.marker(homePos, {icon: homeIcon}).addTo(map).bindPopup("<b>私の自宅</b><br>運気の基点です");

    // 2. 目的地ピン (⛩️)
    const jinjaIcon = L.divIcon({
        html: '<div style="font-size: 30px;">⛩️</div>',
        className: 'custom-icon', iconSize: [40, 40], iconAnchor: [20, 20]
    });
    L.marker(targetPos, {icon: jinjaIcon}).addTo(map).bindPopup("甲山八幡宮");

    // 3. 自宅からの方位線を地図上に描画
    // Leafletの座標を画面上のピクセルに変換して光を重ねる処理
    const overlay = L.SVG.overlay = function() {}; // 簡易的な演出用

    // 地図のズームや移動に合わせて方位線の位置を調整
    function updateBeam() {
        const pixelHome = map.latLngToContainerPoint(homePos);
        // 本来はここにCanvas等で描画するが、今回は概念として中心に自宅を据える
    }
    map.on('move', updateBeam);
</script>

</body>
</html>
