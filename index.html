<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吉方位まいりガイド 2026 | Map Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --jp-blue: #001f41; --gold: #d4af37; --danger: #e63946; }
        body { margin: 0; font-family: sans-serif; background: var(--jp-blue); color: white; }
        #map { width: 100%; height: 70vh; background: #ddd; }
        .ui-panel { padding: 15px; background: #fff; color: #333; border-radius: 15px 15px 0 0; position: relative; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
        .btn { background: var(--gold); color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; width: 100%; cursor: pointer; }
        .legend { display: flex; font-size: 11px; gap: 10px; margin-top: 8px; justify-content: center; }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .bad { background: var(--danger); color: white; }
        .lucky { background: #457b9d; color: white; }
        .eho { background: var(--gold); color: white; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-panel">
    <div style="text-align: center; margin-bottom: 10px;">
        <h3 style="margin: 0; color: var(--jp-blue);">⛩️ 吉方位まいり 2026</h3>
        <p style="font-size: 12px; margin: 5px 0;">一白水星中宮・丙午</p>
    </div>
    
    <button class="btn" onclick="setHomeToCenter()">現在の中心を「自宅」に設定</button>
    
    <div id="status" style="margin-top: 15px; font-size: 14px; border-top: 1px solid #eee; padding-top: 10px;">
        地図上のどこかをタップすると、自宅からの方位を判定します。
    </div>

    <div class="legend">
        <span>🔴 南：五黄殺</span>
        <span>🔘 北：暗剣殺・歳破</span>
        <span>🟡 南南東：恵方</span>
    </div>
</div>

<script>
    // 1. 地図の初期化
    const map = L.map('map').setView([35.6812, 139.7671], 13); // 初期位置：東京駅
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let homeMarker = null;
    let compassLayers = [];

    // 2. 自宅設定関数
    function setHomeToCenter() {
        const center = map.getCenter();
        if (homeMarker) map.removeLayer(homeMarker);
        
        homeMarker = L.marker(center, { draggable: true }).addTo(map)
            .bindPopup("<b>あなたの自宅（太極）</b>").openPopup();
            
        homeMarker.on('dragend', drawKigakuSectors);
        drawKigakuSectors();
    }

    // 3. 九星気学 30°/60° 方位盤描画
    function drawKigakuSectors() {
        if (!homeMarker) return;
        const center = homeMarker.getLatLng();
        
        // 既存の方位盤を消去
        compassLayers.forEach(l => map.removeLayer(l));
        compassLayers = [];

        const sectors = [
            { name: "北", angle: 30, start: -15, color: "#666" },      // 暗剣殺・歳破
            { name: "北東", angle: 60, start: 15, color: "#aaa" },
            { name: "東", angle: 30, start: 75, color: "#457b9d" },
            { name: "南東", angle: 60, start: 105, color: "#457b9d" },
            { name: "南", angle: 30, start: 165, color: "#e63946" },   // 五黄殺
            { name: "南西", angle: 60, start: 195, color: "#aaa" },
            { name: "西", angle: 30, start: 255, color: "#457b9d" },
            { name: "北西", angle: 60, start: 285, color: "#aaa" }
        ];

        sectors.forEach(s => {
            const points = [ [center.lat, center.lng] ];
            const radius = 0.1; // 描画半径（約10km相当）

            for (let a = s.start; a <= s.start + s.angle; a += 2) {
                const rad = (90 - a) * Math.PI / 180;
                points.push([
                    center.lat + (radius * Math.sin(rad)),
                    center.lng + (radius * Math.cos(rad) * Math.cos(center.lat * Math.PI / 180))
                ]);
            }

            const poly = L.polygon(points, {
                color: s.color,
                weight: 1,
                fillColor: s.color,
                fillOpacity: 0.3,
                interactive: false
            }).addTo(map);
            compassLayers.push(poly);
        });

        // 恵方（南南東：丙 165°付近）をハイライト
        const ehoLine = L.polyline([
            [center.lat, center.lng],
            [center.lat - 0.08, center.lng + 0.03]
        ], { color: '#d4af37', weight: 8, opacity: 0.7 }).addTo(map);
        compassLayers.push(ehoLine);
    }

    // 4. 地図クリックで目的地判定
    map.on('click', function(e) {
        if (!homeMarker) return;
        const home = homeMarker.getLatLng();
        const target = e.latlng;
        
        // 角度計算
        let angle = Math.atan2(target.lng - home.lng, target.lat - home.lat) * 180 / Math.PI;
        if (angle < 0) angle += 360;

        let res = "";
        if (angle > 345 || angle <= 15) res = "<span class='status-badge bad'>北：最大凶（歳破・暗剣殺）</span>";
        else if (angle > 165 && angle <= 195) res = "<span class='status-badge bad'>南：大凶（五黄殺）</span>";
        else if (angle > 150 && angle <= 165) res = "<span class='status-badge eho'>南南東：✨恵方✨</span>";
        else res = "<span class='status-badge lucky'>吉方位（または普通）</span>";

        document.getElementById('status').innerHTML = `
            <b>目的地判定:</b><br>
            方位角: ${Math.round(angle)}度<br>結果: ${res}
        `;
    });
</script>
</body>
</html>
