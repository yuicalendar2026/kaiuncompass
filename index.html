<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吉方位まいりガイド 2026 (一白中宮版)</title>
    <style>
        :root {
            --japan-blue: #001f41;
            --gold: #d4af37;
            --danger: #e63946;
            --safe: #457b9d;
        }
        body {
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--japan-blue);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--gold);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }
        #map-area {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            background: #eee;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--gold);
            cursor: crosshair;
        }
        #compass-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .home-marker {
            position: absolute;
            width: 20px;
            height: 20px;
            background: red;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            z-index: 10;
        }
        .controls { display: grid; gap: 10px; }
        button {
            background: var(--gold);
            color: var(--japan-blue);
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        .legend {
            font-size: 0.8rem;
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>⛩️ 吉方位まいりガイド 2026</h2>
    <p style="font-size: 0.9rem; text-align: center;">一白水星中宮年・丙午の運気</p>

    <div class="card">
        <div class="controls">
            <label>1. 地図上をクリックして自宅(太極)を固定</label>
            <div id="map-area" onclick="setHome(event)">
                <div id="home-icon" class="home-marker" style="display:none;"></div>
                <canvas id="compass-canvas"></canvas>
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#999; z-index:0;">MAP AREA</div>
            </div>
            <div class="legend">
                <span>🔴：五黄殺/暗剣殺</span>
                <span>🔘：歳破</span>
                <span>🟡：恵方(南南東)</span>
            </div>
        </div>
    </div>

    <div class="card" id="info-panel">
        <h3 id="sector-name">方位を選択してください</h3>
        <p id="fortune-text">自宅を固定すると、2026年の吉凶が表示されます。</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('compass-canvas');
    const ctx = canvas.getContext('2d');
    let homePos = null;

    // キャンバスサイズ設定
    function resize() {
        canvas.width = canvas.parentElement.offsetWidth;
        canvas.height = canvas.parentElement.offsetHeight;
        if(homePos) drawCompass();
    }
    window.addEventListener('resize', resize);
    resize();

    function setHome(event) {
        const rect = event.target.getBoundingClientRect();
        homePos = {
            x: event.clientX - rect.left,
            y: event.clientY - rect.top
        };
        const icon = document.getElementById('home-icon');
        icon.style.display = 'block';
        icon.style.left = homePos.x + 'px';
        icon.style.top = homePos.y + 'px';
        drawCompass();
    }

    function drawCompass() {
        if (!homePos) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const sectors = [
            { name: "北", angle: 30, star: "六白" },
            { name: "北東", angle: 60, star: "四緑" },
            { name: "東", angle: 30, star: "八白" },
            { name: "南東", angle: 60, star: "九紫" },
            { name: "南", angle: 30, star: "五黄" },
            { name: "南西", angle: 60, star: "七赤" },
            { name: "西", angle: 30, star: "三碧" },
            { name: "北西", angle: 60, star: "二黒" }
        ];

        let currentAngle = -105; // 北(0度)を真上にするための調整

        sectors.forEach(s => {
            const startRad = currentAngle * Math.PI / 180;
            const endRad = (currentAngle + s.angle) * Math.PI / 180;
            
            ctx.beginPath();
            ctx.moveTo(homePos.x, homePos.y);
            ctx.arc(homePos.x, homePos.y, 800, startRad, endRad);
            ctx.closePath();

            // 2026年（一白中宮）の吉凶判定
            let color = "rgba(255, 255, 255, 0.1)";
            if (s.name === "南") color = "rgba(230, 57, 70, 0.4)"; // 五黄殺
            if (s.name === "北") color = "rgba(100, 100, 100, 0.6)"; // 暗剣殺・歳破
            
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = "rgba(212, 175, 55, 0.3)";
            ctx.stroke();

            // 恵方(南南東)の特別描画
            if (s.name === "南") {
                const ehoStart = (157.5 - 90) * Math.PI / 180;
                const ehoEnd = (172.5 - 90) * Math.PI / 180;
                ctx.beginPath();
                ctx.moveTo(homePos.x, homePos.y);
                ctx.arc(homePos.x, homePos.y, 800, ehoStart, ehoEnd);
                ctx.fillStyle = "rgba(212, 175, 55, 0.4)";
                ctx.fill();
            }

            currentAngle += s.angle;
        });

        document.getElementById('sector-name').innerText = "2026年度 方位盤確定";
        document.getElementById('fortune-text').innerHTML = `
            基準：一白水星中宮年<br>
            ・<b>南(30°)</b>：五黄殺（自滅の凶）<br>
            ・<b>北(30°)</b>：暗剣殺・歳破（災難の凶）<br>
            ・<b>南南東(丙)</b>：恵方（チャンスの神様）
        `;
    }
</script>
</body>
</html>
